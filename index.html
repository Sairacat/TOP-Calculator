<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./scrpit.js" defer></script>
</head>
<body>
    <div class="calculator">
        <div class="display">8 + 3</div>
        <div class="inputboard">
            <div class="input">AC</div>
            <div class="input">+/-</div>
            <div class="input">%</div>
            <div class="input">/</div>
            <div class="input">7</div>
            <div class="input">8</div>
            <div class="input">9</div>
            <div class="input">*</div>
            <div class="input">4</div>
            <div class="input">5</div>
            <div class="input">6</div>
            <div class="input">-</div>
            <div class="input">1</div>
            <div class="input">2</div>
            <div class="input">3</div>
            <div class="input">+</div>
            <div class="input zero">0</div>
            <div class="input">.</div>
            <div class="input">=</div>
        </div>

    </div>
    
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./scrpit.js" defer></script>
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div>CALCULATOR</div>
            <input type="text" id="display" value="0">
        </div>
        <div class="inputboard">
            <div class="input clearButton">AC</div>
            <div class="input">+/-</div>
            <div class="input percent">%</div>
            <div class="input operator">/</div>
            <div class="input number">7</div>
            <div class="input number">8</div>
            <div class="input number">9</div>
            <div class="input operator">*</div>
            <div class="input number">4</div>
            <div class="input number">5</div>
            <div class="input number">6</div>
            <div class="input operator">-</div>
            <div class="input number">1</div>
            <div class="input number">2</div>
            <div class="input number">3</div>
            <div class="input operator">+</div>
            <div class="input zero number">0</div>
            <div class="input decimal">.</div>
            <div class="input equal">=</div>
        </div>

    </div>
    
</body>
</html>
